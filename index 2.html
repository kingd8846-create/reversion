<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="REVERSION">
<title>REVERSION ENGINE · L1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,255,136,0.2);}
html,body{background:#020902;color:#00ff88;font-family:'Courier New',monospace;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:60px;-webkit-text-size-adjust:100%;}
.header{background:linear-gradient(180deg,#0a180a,#020902);border-bottom:1px solid #0d2a0d;padding:14px 16px 10px;position:sticky;top:0;z-index:10;}
.header-top{display:flex;justify-content:space-between;align-items:center;}
.brand{font-size:9px;color:#2a5a3a;letter-spacing:3px;margin-bottom:3px;}
.title{font-size:18px;font-weight:bold;letter-spacing:2px;color:#00ff88;text-shadow:0 0 20px #00ff8866;}
.badge{font-size:8px;letter-spacing:2px;padding:4px 10px;border:1px solid #1a4a2a;color:#2a6a3a;border-radius:2px;}
.badge.active{border-color:#00ff88;color:#00ff88;text-shadow:0 0 8px #00ff88;}
.badge.ready{border-color:#00ff88;color:#00ff88;}
.badge.error{border-color:#ff4444;color:#ff4444;}
.scantime{font-size:7px;color:#1a4a2a;margin-top:3px;text-align:right;}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;}
.stat{background:#0a140a;border-radius:4px;padding:6px 8px;text-align:center;}
.stat-l{font-size:7px;color:#1a4a2a;letter-spacing:1px;margin-bottom:3px;}
.stat-v{font-size:15px;color:#00ff88;font-weight:bold;}
.neural-wrap{border-bottom:1px solid #0d2a0d;padding:8px 16px 4px;}
.sec-title{font-size:7px;color:#1a4a2a;letter-spacing:2px;margin-bottom:6px;}
#neural-svg{width:100%;height:130px;display:block;}

/* BUTTONS — big touch targets, no onclick needed */
.controls{display:flex;gap:8px;padding:10px 16px;}
.btn{
  flex:1;padding:16px 0;border-radius:6px;
  font-family:'Courier New',monospace;font-size:12px;letter-spacing:2px;
  border:2px solid #1a2a1a;background:#0a1a0a;color:#2a5a3a;
  cursor:pointer;display:block;width:100%;
  -webkit-appearance:none;appearance:none;
  touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}
.btn.primary{border-color:#00ff88;color:#00ff88;background:#00ff8818;text-shadow:0 0 8px #00ff88;}
.btn.primary:active{background:#00ff8833;}
.btn.auto-on{border-color:#ffcc00;color:#ffcc00;background:#ffcc0011;}
.btn.auto-on:active{background:#ffcc0033;}
.btn:active{opacity:.7;}
.btn:disabled{opacity:.3;pointer-events:none;}

.log-box{background:#060e06;border:1px solid #0d2a0d;border-radius:4px;padding:8px 10px;max-height:100px;overflow:hidden;margin:0 16px 10px;}
.log-entry{font-size:10px;line-height:1.8;}
.log-ts{color:#1a4a2a;}
.c-ok{color:#00ff88;}.c-warn{color:#ffcc00;}.c-err{color:#ff4444;}.c-info{color:#aaffcc;}

.signals-wrap{padding:0 16px;}
.sig-header{display:flex;justify-content:space-between;margin-bottom:10px;align-items:center;}
.sig-count{font-size:8px;color:#2a6a3a;}
.card{background:linear-gradient(135deg,#0a140a,#060e06);border:1px solid #1a2a1a;border-radius:6px;padding:10px 12px;margin-bottom:8px;position:relative;overflow:hidden;}
.card.hot{border-color:#00ff8855;}
.card-glow{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#00ff88,transparent);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.card-rank{font-size:8px;color:#2a5a3a;letter-spacing:1px;}
.card-score{font-size:16px;font-weight:bold;}
.card-q{font-size:11px;color:#88cc88;line-height:1.4;margin-bottom:8px;border-left:2px solid #00ff8833;padding-left:8px;}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;}
.metric{background:#0d1a0d;border-radius:4px;padding:4px 6px;text-align:center;}
.m-label{font-size:7px;color:#2a5a3a;margin-bottom:2px;}
.m-val{font-size:10px;font-weight:bold;}
.card-foot{display:flex;justify-content:space-between;margin-top:6px;}
.card-meta{font-size:8px;color:#1a4a2a;}
.empty{text-align:center;padding:50px 0;color:#1a4a2a;}
.empty-icon{font-size:28px;margin-bottom:10px;}
.empty-text{font-size:10px;letter-spacing:2px;}
.empty-sub{font-size:8px;color:#0d2a0d;margin-top:6px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pulsing{animation:pulse .8s infinite;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="brand">◆ REVERSION ENGINE</div>
      <div class="title">LAYER 1 · INPUT</div>
    </div>
    <div>
      <div class="badge" id="badge">IDLE</div>
      <div class="scantime" id="scantime">AWAITING SCAN</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-l">SIGNALS</div><div class="stat-v" id="s-signals">0</div></div>
    <div class="stat"><div class="stat-l">SCANNED</div><div class="stat-v" id="s-scanned">0</div></div>
    <div class="stat"><div class="stat-l">FIRE RATE</div><div class="stat-v">43 Hz</div></div>
  </div>
</div>

<div class="neural-wrap">
  <div class="sec-title">◆ LAYER ARCHITECTURE · SIGNAL PROPAGATION</div>
  <svg id="neural-svg" viewBox="0 0 320 120"></svg>
</div>

<div class="controls">
  <button class="btn primary" id="btn-scan">► RUN SCAN</button>
  <button class="btn" id="btn-auto">⏵ AUTO: OFF</button>
</div>

<div class="log-box">
  <div class="sec-title">◆ EVENT LOG</div>
  <div id="log"><div class="log-entry"><span class="log-ts">-- </span><span class="c-ok">Engine ready. Tap RUN SCAN.</span></div></div>
</div>

<div class="signals-wrap">
  <div class="sig-header">
    <div class="sec-title">◆ HIGH EDGE SIGNALS · SORTED BY SCORE</div>
    <div class="sig-count" id="sig-count">0 ACTIVE</div>
  </div>
  <div id="sig-list">
    <div class="empty">
      <div class="empty-icon">◆</div>
      <div class="empty-text">TAP RUN SCAN TO BEGIN</div>
      <div class="empty-sub">REVERSION ENGINE STANDING BY</div>
    </div>
  </div>
</div>

<script>
// ── Wire buttons with both touch and click ──────
const btnScan = document.getElementById('btn-scan');
const btnAuto = document.getElementById('btn-auto');

function addTap(el, fn) {
  el.addEventListener('touchend', function(e){ e.preventDefault(); fn(); }, {passive:false});
  el.addEventListener('click', fn);
}
addTap(btnScan, runScan);
addTap(btnAuto, toggleAuto);

// ── STATE ───────────────────────────────────────
let signals=[], totalScanned=0, scanning=false, autoMode=false, autoTimer=null, pulseCol=0, neuralTimer=null;

// ── NEURAL ──────────────────────────────────────
const LAYERS=['INPUT','NORM','DEVIATE','FILTER','DECIDE','EXECUTE'];
const COLS=6,ROWS=8,W=320,H=120,cW=W/(COLS+1),rH=H/(ROWS+1);

function drawNeural(n){
  const svg=document.getElementById('neural-svg');
  const active=new Set();
  for(let i=0;i<Math.min(n,20);i++) active.add(`${Math.floor(Math.random()*COLS)}-${Math.floor(Math.random()*ROWS)}`);
  let h='';
  for(let c=0;c<COLS-1;c++) for(let r=0;r<ROWS;r++){
    if(Math.random()>.55)continue;
    const r2=Math.max(0,Math.min(ROWS-1,r+Math.floor(Math.random()*3)-1));
    const a=active.has(`${c}-${r}`)||active.has(`${c+1}-${r2}`);
    h+=`<line x1="${cW*(c+1)}" y1="${rH*(r+1)}" x2="${cW*(c+2)}" y2="${rH*(r2+1)}" stroke="${a?'#00ff8833':'#0d1a0d'}" stroke-width="${a?1:.5}"/>`;
  }
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){
    const k=`${c}-${r}`,a=active.has(k),b=a&&c===pulseCol;
    h+=`<circle cx="${cW*(c+1)}" cy="${rH*(r+1)}" r="${b?5:a?3.5:2}" fill="${b?'#00ff88':a?'#00cc66':'#1a2a1a'}" stroke="${b?'#00ff88':a?'#00cc66':'#0d1a0d'}" stroke-width=".5" style="filter:${b?'drop-shadow(0 0 6px #00ff88)':a?'drop-shadow(0 0 3px #00cc66)':'none'}"/>`;
  }
  LAYERS.forEach((l,i)=>{ h+=`<text x="${cW*(i+1)}" y="${H-4}" text-anchor="middle" fill="${i===pulseCol&&scanning?'#00ff88':'#1a4a2a'}" font-size="7" font-family="monospace">${l}</text>`; });
  svg.innerHTML=h;
}
drawNeural(0);
function startNeural(){neuralTimer=setInterval(()=>{pulseCol=(pulseCol+1)%COLS;drawNeural(signals.length);},250);}
function stopNeural(){clearInterval(neuralTimer);drawNeural(signals.length);}

// ── LOG ─────────────────────────────────────────
function log(msg,cls='c-ok'){
  const ts=new Date().toLocaleTimeString();
  const el=document.getElementById('log');
  const d=document.createElement('div');
  d.className='log-entry';
  d.innerHTML=`<span class="log-ts">${ts} </span><span class="${cls}">${msg}</span>`;
  el.insertBefore(d,el.firstChild);
  while(el.children.length>7) el.removeChild(el.lastChild);
}

// ── CALC ─────────────────────────────────────────
function calcDev(yes){
  const dev=Math.abs(yes-50),sigma=+(dev/15).toFixed(2);
  let edge=0,dir='NEUTRAL';
  if(yes>68){edge=+(yes-68).toFixed(1);dir='SHORT YES';}
  else if(yes<32){edge=+(32-yes).toFixed(1);dir='LONG YES';}
  return{dev:+dev.toFixed(1),sigma,edge,dir};
}
function calcScore(liq,d){
  return +(Math.min((d.edge/30)*40,40)+Math.min((liq/50000)*30,30)+Math.min((d.sigma/4)*30,30)).toFixed(1);
}
function setBadge(txt,cls=''){
  const el=document.getElementById('badge');
  el.textContent=txt;el.className='badge'+(cls?' '+cls:'');
}

// ── SCAN ─────────────────────────────────────────
async function runScan(){
  if(scanning) return;
  scanning=true;
  btnScan.disabled=true;
  btnScan.textContent='► SCANNING...';
  setBadge('SCANNING','active pulsing');
  log('► Connecting to Polymarket...','c-ok');
  startNeural();

  try{
    const url='https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=100&order=volume24hr&ascending=false';
    log('  Fetching live markets...','c-info');
    const r = await fetch(url);
    if(!r.ok) throw new Error(`Server returned ${r.status}`);
    const data = await r.json();

    log(`  ${data.length} markets received`,'c-info');
    totalScanned += data.length;
    document.getElementById('s-scanned').textContent = totalScanned.toLocaleString();
    setBadge('ANALYZING','active pulsing');

    const found=[];
    for(const m of data){
      try{
        let prices=m.outcomePrices;
        if(typeof prices==='string') prices=JSON.parse(prices);
        prices=(prices||[]).map(Number);
        if(prices.length<2) continue;
        const yes=+(prices[0]*100).toFixed(1);
        const liq=+(parseFloat(m.liquidity||0)).toFixed(0);
        const vol=+(parseFloat(m.volume||0)).toFixed(0);
        if(liq<500) continue;
        const d=calcDev(yes);
        if(d.edge<8) continue;
        const sc=calcScore(liq,d);
        found.push({id:m.id,question:m.question||'Unknown',yes,no:+(prices[1]*100).toFixed(1),liq,vol,endDate:m.endDate||'',edge:d.edge,dir:d.dir,sigma:d.sigma,score:sc});
      }catch(e){}
    }

    found.sort((a,b)=>b.score-a.score);
    signals=found.slice(0,20);
    document.getElementById('s-signals').textContent=signals.length;
    document.getElementById('sig-count').textContent=signals.length+' ACTIVE';
    setBadge('READY','ready');
    log(`✓ ${signals.length} HIGH EDGE signals found`,'c-ok');
    if(signals.length>0) log(`  TOP: ${signals[0].question.slice(0,40)}… [${signals[0].score}]`,'c-warn');
    else log('  No mispriced markets this cycle','c-info');
    render();

  }catch(e){
    log(`✗ Error: ${e.message}`,'c-err');
    if(e.message.includes('fetch')||e.message.includes('Failed')||e.message.toLowerCase().includes('cors')){
      log('  Make sure you opened in Safari','c-warn');
    }
    setBadge('ERROR','error');
  }

  scanning=false;
  stopNeural();
  btnScan.disabled=false;
  btnScan.textContent='► RUN SCAN';
  document.getElementById('scantime').textContent='LAST: '+new Date().toLocaleTimeString();
  setTimeout(()=>{ if(!scanning) setBadge('STANDBY'); },4000);
}

// ── AUTO ─────────────────────────────────────────
function toggleAuto(){
  autoMode=!autoMode;
  if(autoMode){
    btnAuto.textContent='⏸ AUTO: ON';
    btnAuto.className='btn auto-on';
    log('Auto-scan ON — every 2 min','c-warn');
    autoTimer=setInterval(runScan,120000);
    runScan();
  }else{
    btnAuto.textContent='⏵ AUTO: OFF';
    btnAuto.className='btn';
    clearInterval(autoTimer);
    log('Auto-scan paused','c-info');
  }
}

// ── RENDER ────────────────────────────────────────
function render(){
  const list=document.getElementById('sig-list');
  if(!signals.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">◆</div><div class="empty-text">NO EDGE SIGNALS THIS CYCLE</div><div class="empty-sub">STANDING BY</div></div>';
    return;
  }
  list.innerHTML=signals.map((s,i)=>{
    const ec=s.score>60?'#00ff88':s.score>35?'#ffcc00':'#ff6644';
    const dc=s.dir==='LONG YES'?'#00ff88':'#ff4466';
    const hot=s.score>60;
    const q=s.question.length>85?s.question.slice(0,85)+'…':s.question;
    return`<div class="card${hot?' hot':''}">
      ${hot?'<div class="card-glow"></div>':''}
      <div class="card-top">
        <div class="card-rank">#${i+1} · SIGNAL DETECTED</div>
        <div class="card-score" style="color:${ec};text-shadow:${hot?`0 0 10px ${ec}`:'none'}">${s.score}</div>
      </div>
      <div class="card-q">${q}</div>
      <div class="metrics">
        <div class="metric"><div class="m-label">YES</div><div class="m-val" style="color:#00ff88">${s.yes}%</div></div>
        <div class="metric"><div class="m-label">EDGE</div><div class="m-val" style="color:${ec}">+${s.edge}</div></div>
        <div class="metric"><div class="m-label">σ</div><div class="m-val" style="color:#aaffcc">${s.sigma}σ</div></div>
        <div class="metric"><div class="m-label">DIR</div><div class="m-val" style="color:${dc};font-size:8px">${s.dir}</div></div>
      </div>
      <div class="card-foot">
        <span class="card-meta">LIQ $${Math.round(s.liq).toLocaleString()}</span>
        <span class="card-meta">VOL $${Math.round(s.vol).toLocaleString()}</span>
        <span class="card-meta">${s.endDate?new Date(s.endDate).toLocaleDateString():'—'}</span>
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
