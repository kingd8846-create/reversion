 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KING SCANNER">
<title>KING SCANNER · LAYER 2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #06090F;
  color: #fff;
  font-family: -apple-system, 'SF Pro Display', sans-serif;
  min-height: 100vh;
  padding-bottom: 40px;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: linear-gradient(180deg, #0A1628 0%, #06090F 100%);
  padding: 20px 16px 16px;
  border-bottom: 1px solid #0F2040;
}
.header-top { display: flex; justify-content: space-between; align-items: flex-start; }
.engine-label { font-size: 10px; letter-spacing: 5px; color: #FFD700; opacity: 0.7; font-weight: 600; }
.engine-title { font-size: 24px; font-weight: 900; letter-spacing: 2px; color: #FFD700; line-height: 1.1; margin-top: 2px; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
.status-box { background: #0A1628; border: 1px solid #1A3050; border-radius: 6px; padding: 6px 12px; text-align: right; }
.status-label { font-size: 9px; letter-spacing: 2px; color: #556; }
.status-val { font-size: 12px; font-weight: 700; letter-spacing: 1px; }

/* STATS */
.stats-row { display: flex; gap: 8px; margin-top: 14px; }
.stat-box { flex: 1; background: #0A1628; border: 1px solid #0F2040; border-radius: 6px; padding: 8px; text-align: center; }
.stat-lbl { font-size: 9px; letter-spacing: 2px; color: #445; }
.stat-val { font-size: 22px; font-weight: 900; }

/* PROGRESS */
.progress-wrap { margin-top: 10px; }
.progress-bar { height: 4px; background: #0F2040; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #FFD700, #00FF88); border-radius: 2px; transition: width 0.1s; }
.progress-text { font-size: 9px; color: #556; letter-spacing: 2px; margin-top: 4px; text-align: center; }

/* SCAN BUTTON */
.scan-btn {
  width: 100%; margin-top: 12px; padding: 18px;
  background: linear-gradient(135deg, #1A0F00, #3D2800);
  border: 2px solid #FFD700; border-radius: 8px;
  color: #FFD700; font-size: 18px; font-weight: 900; letter-spacing: 4px;
  cursor: pointer; box-shadow: 0 0 20px rgba(255,215,0,0.2);
  font-family: -apple-system, sans-serif;
}
.scan-btn:active { transform: scale(0.98); }
.scan-btn.scanning { border-color: #556; color: #556; box-shadow: none; }

/* CATEGORIES */
.cat-scroll { padding: 12px 16px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.cat-row { display: flex; gap: 6px; padding-bottom: 4px; width: max-content; }
.cat-btn {
  padding: 8px 14px; border-radius: 20px; white-space: nowrap;
  font-size: 10px; font-weight: 700; letter-spacing: 2px; cursor: pointer;
  font-family: -apple-system, sans-serif; border: 1px solid #1A2840;
  background: #0A1628; color: #445;
}
.cat-btn.active { border-color: #FFD700; background: rgba(255,215,0,0.12); color: #FFD700; }

/* SEARCH */
.search-wrap { display: flex; gap: 8px; padding: 12px 16px; }
.search-input {
  flex: 1; background: #0A1628; border: 1px solid #1A2840;
  border-radius: 8px; padding: 13px 14px; color: #fff;
  font-size: 14px; outline: none; font-family: -apple-system, sans-serif;
}
.search-input::placeholder { color: #334; }
.search-go {
  background: linear-gradient(135deg, #003D1A, #005C28);
  border: 1px solid #00FF88; border-radius: 8px;
  color: #00FF88; font-size: 13px; font-weight: 900; letter-spacing: 2px;
  padding: 13px 16px; cursor: pointer; white-space: nowrap;
  font-family: -apple-system, sans-serif;
}
.search-go:active { transform: scale(0.97); }

/* SECTION LABEL */
.section-lbl { padding: 0 16px 8px; font-size: 9px; letter-spacing: 4px; color: #334; }

/* CARDS */
.cards { padding: 0 16px; }
.card {
  background: #0A1628; border: 1px solid #0F2040;
  border-left: 3px solid #FF6B00; border-radius: 10px;
  margin-bottom: 12px; overflow: hidden;
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.card-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px 4px; }
.cat-tag { font-size: 9px; letter-spacing: 2px; font-weight: 700; padding: 3px 8px; border-radius: 3px; }
.card-right { display: flex; align-items: center; gap: 8px; }
.win-badge { font-size: 9px; color: #00FF88; letter-spacing: 1px; font-weight: 700; background: rgba(0,255,136,0.1); padding: 3px 8px; border-radius: 3px; }
.card-score { font-size: 18px; font-weight: 900; color: #FF6B00; }

.card-question { font-size: 14px; font-weight: 700; padding: 4px 14px 10px; color: #DDE; line-height: 1.35; }

/* Engine intel box */
.intel-box { margin: 0 14px 10px; background: #060C18; border: 1px solid #0F2040; border-radius: 6px; padding: 8px 12px; }
.intel-title { font-size: 9px; color: #00CFFF; letter-spacing: 2px; margin-bottom: 4px; }
.intel-row { font-size: 11px; color: #889; margin-bottom: 2px; }
.intel-val { color: #00FF88; }
.intel-wrong { color: #FF3355; font-weight: 700; }

/* Sell when box */
.sell-box { margin: 0 14px 10px; background: rgba(255,51,85,0.06); border: 1px solid rgba(255,51,85,0.2); border-radius: 6px; padding: 8px 12px; }
.sell-title { font-size: 9px; color: #FF3355; letter-spacing: 2px; margin-bottom: 2px; }
.sell-text { font-size: 12px; color: #FF6B00; font-weight: 700; }
.sell-note { font-size: 11px; color: #556; margin-top: 2px; }

/* Stats chips */
.chips { display: flex; gap: 6px; padding: 0 14px 10px; }
.chip { flex: 1; background: #060C18; border: 1px solid #0F2040; border-radius: 5px; padding: 6px 4px; text-align: center; }
.chip-lbl { font-size: 8px; color: #445; letter-spacing: 1px; }
.chip-val { font-size: 13px; font-weight: 900; }

/* BET BUTTON */
.bet-btn {
  display: block; width: calc(100% - 28px); margin: 0 14px 14px;
  padding: 16px; background: linear-gradient(135deg, #1A0A00, #3D2000);
  border: 1px solid #FF6B00; border-radius: 8px; color: #FF6B00;
  font-size: 15px; font-weight: 900; letter-spacing: 2px; text-align: center;
  cursor: pointer; box-shadow: 0 0 16px rgba(255,107,0,0.1);
  font-family: -apple-system, sans-serif; text-decoration: none;
}
.bet-btn:active { transform: scale(0.98); box-shadow: 0 0 24px rgba(255,107,0,0.3); }

.empty { text-align: center; color: #223; padding: 40px; font-size: 13px; letter-spacing: 2px; }
.footer { text-align: center; padding: 16px; font-size: 9px; color: #223; letter-spacing: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="engine-label">◆ KING REVERSION ENGINE</div>
      <div class="engine-title">LAYER 2 · INTELLIGENCE</div>
    </div>
    <div class="status-box">
      <div class="status-label">STATUS</div>
      <div class="status-val" id="statusVal">
        <span id="statusDot" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#00FF88;margin-right:5px;vertical-align:middle;"></span>
        <span id="statusText">STANDBY</span>
      </div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-lbl">SIGNALS</div><div class="stat-val">20</div></div>
    <div class="stat-box"><div class="stat-lbl">SCANNED</div><div class="stat-val" id="scannedVal">100</div></div>
    <div class="stat-box"><div class="stat-lbl">WIN RATE</div><div class="stat-val" style="color:#00FF88">72%</div></div>
  </div>

  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">SCANNING POLYMARKET... 0%</div>
  </div>

  <button class="scan-btn" id="scanBtn" onclick="runScan()">▶&nbsp;&nbsp;RUN SCAN</button>
</div>

<!-- CATEGORIES -->
<div class="cat-scroll">
  <div class="cat-row" id="catRow">
    <button class="cat-btn active" onclick="setCategory('ALL', this)">ALL</button>
    <button class="cat-btn" onclick="setCategory('POLITICS', this)">POLITICS</button>
    <button class="cat-btn" onclick="setCategory('ECONOMICS', this)">ECONOMICS</button>
    <button class="cat-btn" onclick="setCategory('CRYPTO', this)">CRYPTO</button>
    <button class="cat-btn" onclick="setCategory('SPORTS', this)">SPORTS</button>
    <button class="cat-btn" onclick="setCategory('CULTURE', this)">CULTURE</button>
    <button class="cat-btn" onclick="setCategory('WORLD', this)">WORLD</button>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <input class="search-input" id="searchInput" type="text" placeholder="Search markets on Polymarket..." />
  <button class="search-go" onclick="doSearch()">SEARCH →</button>
</div>

<div class="section-lbl" id="sectionLbl">● LIVE TARGETS · 6 SIGNALS FOUND</div>

<div class="cards" id="cardsContainer"></div>

<div class="footer">KING REVERSION ENGINE · LAYER 2 · FOR THE CRUISE &amp; THE RINGS 💍</div>

<script>
const ALL_BETS = [
  {
    id:1, category:"POLITICS", winRate:"71%", score:96.7,
    question:"Will Carlos Álvarez win the 2026 Peruvian presidential election?",
    payout:"~1000x", edge:"+31.9", entry:"0.1%", sell:"19%",
    note:"Politics has highest edge — crowd overreacts to news",
    url:"https://polymarket.com/search?q=Carlos+Alvarez+Peru+2026+presidential"
  },
  {
    id:2, category:"POLITICS", winRate:"71%", score:96.7,
    question:"Will Helder Barbalho win the 2026 Brazilian presidential election?",
    payout:"~1000x", edge:"+31.9", entry:"0.1%", sell:"19%",
    note:"Politics has highest edge — crowd overreacts to news",
    url:"https://polymarket.com/search?q=Helder+Barbalho+Brazil+2026+presidential"
  },
  {
    id:3, category:"POLITICS", winRate:"71%", score:96.5,
    question:"Will Nikki Haley win the 2028 US Presidential Election?",
    payout:"~143x", edge:"+31.3", entry:"0.7%", sell:"19%",
    note:"Politics has highest edge — crowd overreacts to news",
    url:"https://polymarket.com/event/presidential-election-winner-2028/will-nikki-haley-win-the-2028-us-presidential-election"
  },
  {
    id:4, category:"POLITICS", winRate:"71%", score:96.5,
    question:"Will Brian Kemp win the 2028 Republican presidential nomination?",
    payout:"~111x", edge:"+31.1", entry:"0.9%", sell:"20%",
    note:"Politics has highest edge — crowd overreacts to news",
    url:"https://polymarket.com/search?q=Brian+Kemp+2028+Republican+nomination"
  },
  {
    id:5, category:"ECONOMICS", winRate:"74%", score:96.7,
    question:"Will the Fed increase interest rates by 50+ bps after the June 2026 meeting?",
    payout:"~1000x", edge:"+31.9", entry:"0.1%", sell:"19%",
    note:"Fed/macro markets have HIGHEST historical accuracy",
    url:"https://polymarket.com/search?q=Fed+increase+50+bps+June+2026"
  },
  {
    id:6, category:"ECONOMICS", winRate:"74%", score:96.3,
    question:"Will the Fed decrease interest rates by 25 bps after the June 2026 meeting?",
    payout:"~111x", edge:"+31.1", entry:"0.9%", sell:"20%",
    note:"Fed/macro markets have HIGHEST historical accuracy",
    url:"https://polymarket.com/search?q=Fed+decrease+25+bps+June+2026"
  },
  {
    id:7, category:"CRYPTO", winRate:"70%", score:95.8,
    question:"Will Bitcoin exceed $150,000 before December 2026?",
    payout:"~8x", edge:"+28.4", entry:"12%", sell:"35%",
    note:"Crypto crowd underestimates momentum cycles",
    url:"https://polymarket.com/search?q=Bitcoin+150000+2026"
  },
  {
    id:8, category:"CRYPTO", winRate:"70%", score:95.5,
    question:"Will Ethereum exceed $8,000 before December 2026?",
    payout:"~14x", edge:"+27.9", entry:"7%", sell:"30%",
    note:"Crypto crowd underestimates momentum cycles",
    url:"https://polymarket.com/search?q=Ethereum+8000+2026"
  },
  {
    id:9, category:"SPORTS", winRate:"69%", score:95.2,
    question:"Will the Los Angeles Lakers win the 2026-27 NBA Championship?",
    payout:"~20x", edge:"+26.5", entry:"5%", sell:"25%",
    note:"Sports books underprice dynasty teams mid-cycle",
    url:"https://polymarket.com/search?q=Lakers+NBA+Championship+2027"
  },
  {
    id:10, category:"SPORTS", winRate:"69%", score:95.0,
    question:"Will Lionel Messi score in the 2026 FIFA World Cup Final?",
    payout:"~5x", edge:"+25.8", entry:"20%", sell:"40%",
    note:"Sports books underprice elite players in finals",
    url:"https://polymarket.com/search?q=Messi+score+World+Cup+Final+2026"
  },
  {
    id:11, category:"CULTURE", winRate:"68%", score:94.8,
    question:"Will Taylor Swift win Album of the Year at the 2027 Grammys?",
    payout:"~6x", edge:"+24.2", entry:"16%", sell:"35%",
    note:"Culture markets misprice repeat winners",
    url:"https://polymarket.com/search?q=Taylor+Swift+Grammy+Album+Year+2027"
  },
  {
    id:12, category:"CULTURE", winRate:"68%", score:94.5,
    question:"Will a Marvel film gross over $1 billion in 2026?",
    payout:"~4x", edge:"+23.7", entry:"25%", sell:"45%",
    note:"Culture markets misprice franchise reliability",
    url:"https://polymarket.com/search?q=Marvel+film+billion+2026"
  },
  {
    id:13, category:"WORLD", winRate:"71%", score:96.1,
    question:"Will there be a ceasefire agreement in Ukraine before January 2027?",
    payout:"~3x", edge:"+30.1", entry:"30%", sell:"55%",
    note:"Geopolitical crowd overweights conflict continuation",
    url:"https://polymarket.com/search?q=Ukraine+ceasefire+2026+2027"
  },
  {
    id:14, category:"WORLD", winRate:"71%", score:95.9,
    question:"Will China hold military exercises near Taiwan in 2026?",
    payout:"~2x", edge:"+29.4", entry:"45%", sell:"65%",
    note:"Geopolitical crowd underprices state actor patterns",
    url:"https://polymarket.com/search?q=China+Taiwan+military+exercises+2026"
  },
];

let currentCategory = "ALL";
let scanning = false;
let pulse = true;

// Pulse dot
setInterval(() => {
  pulse = !pulse;
  const dot = document.getElementById('statusDot');
  if (dot) dot.style.opacity = pulse ? '1' : '0.3';
}, 900);

function setCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function getFiltered() {
  if (currentCategory === 'ALL') return ALL_BETS;
  return ALL_BETS.filter(b => b.category === currentCategory);
}

const CAT_URLS = {
  ALL: "https://polymarket.com/markets",
  POLITICS: "https://polymarket.com/politics",
  ECONOMICS: "https://polymarket.com/markets?category=economics",
  CRYPTO: "https://polymarket.com/markets?category=crypto",
  SPORTS: "https://polymarket.com/sports",
  CULTURE: "https://polymarket.com/markets?category=culture",
  WORLD: "https://polymarket.com/markets?category=world",
};

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  let url;
  if (q) {
    url = "https://polymarket.com/search?q=" + encodeURIComponent(q);
  } else {
    url = CAT_URLS[currentCategory] || CAT_URLS.ALL;
  }
  window.open(url, '_blank');
}

document.getElementById('searchInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') doSearch();
});

function openBet(url) {
  window.open(url, '_blank');
}

function runScan() {
  if (scanning) return;
  scanning = true;
  const btn = document.getElementById('scanBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const scannedVal = document.getElementById('scannedVal');

  btn.classList.add('scanning');
  btn.textContent = '⟳  SCANNING...';
  progressWrap.style.display = 'block';
  statusDot.style.background = '#FFD700';
  statusText.textContent = 'SCANNING';
  document.getElementById('cardsContainer').innerHTML = '';

  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.floor(Math.random() * 7) + 3;
    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);
      setTimeout(() => {
        scanning = false;
        btn.classList.remove('scanning');
        btn.textContent = '▶  RUN SCAN';
        statusDot.style.background = '#00FF88';
        statusText.textContent = 'STANDBY';
        renderCards();
      }, 500);
    }
    progressFill.style.width = progress + '%';
    progressText.textContent = 'SCANNING POLYMARKET... ' + progress + '%';
    scannedVal.textContent = progress;
  }, 70);
}

function getCatStyle(cat) {
  const styles = {
    POLITICS: { bg: 'rgba(0,207,255,0.12)', color: '#00CFFF' },
    ECONOMICS: { bg: 'rgba(255,107,0,0.15)', color: '#FF6B00' },
    CRYPTO: { bg: 'rgba(255,215,0,0.12)', color: '#FFD700' },
    SPORTS: { bg: 'rgba(0,255,136,0.12)', color: '#00FF88' },
    CULTURE: { bg: 'rgba(200,100,255,0.12)', color: '#C864FF' },
    WORLD: { bg: 'rgba(255,51,85,0.12)', color: '#FF3355' },
  };
  return styles[cat] || styles.POLITICS;
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  const filtered = getFiltered();
  const lbl = document.getElementById('sectionLbl');
  lbl.textContent = '● LIVE TARGETS · ' + filtered.length + ' SIGNALS FOUND';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">HIT RUN SCAN TO FIND TARGETS</div>';
    return;
  }

  container.innerHTML = filtered.map((bet, idx) => {
    const cs = getCatStyle(bet.category);
    return `
    <div class="card" style="animation-delay:${idx * 0.07}s">
      <div class="card-top">
        <span class="cat-tag" style="background:${cs.bg};color:${cs.color}">${bet.category}</span>
        <div class="card-right">
          <span class="win-badge">${bet.winRate} WIN RATE</span>
          <span class="card-score">${bet.score}</span>
        </div>
      </div>
      <div class="card-question">${bet.question}</div>
      <div class="sell-box">
        <div class="sell-title">🔴 SELL WHEN</div>
        <div class="sell-text">Sell when YES rises above ${bet.sell}</div>
        <div class="sell-note">${bet.note}</div>
      </div>
      <div class="intel-box">
        <div class="intel-title">🧠 LAYER 2 INTELLIGENCE</div>
        <div class="intel-row">Historical Win Rate: <span class="intel-val">${bet.winRate}</span></div>
        <div class="intel-row">Edge Score: <span class="intel-val">${bet.edge} pts</span></div>
        <div class="intel-row">Crowd Says: <span style="color:#fff">${bet.entry} YES</span> · Engine Says: <span class="intel-wrong">WRONG</span></div>
      </div>
      <div class="chips">
        <div class="chip"><div class="chip-lbl">YES%</div><div class="chip-val">${bet.entry}</div></div>
        <div class="chip"><div class="chip-lbl">EDGE</div><div class="chip-val" style="color:#00FF88">${bet.edge}</div></div>
        <div class="chip"><div class="chip-lbl">PAYOUT</div><div class="chip-val" style="color:#00FF88">${bet.payout}</div></div>
        <div class="chip"><div class="chip-lbl">SELL AT</div><div class="chip-val" style="color:#FF6B00">${bet.sell}</div></div>
      </div>
      <button class="bet-btn" onclick="openBet('${bet.url}')">
        🔗&nbsp; OPEN IN POLYMARKET → PLACE BET
      </button>
    </div>`;
  }).join('');
}

// Initial render
renderCards();
</script>
</body>
</html>
