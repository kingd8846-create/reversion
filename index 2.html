.status-txt { font-size:11px; font-weight:700; letter-spacing:1px; color:#00FF88; }

.stat-v { font-size:20px; font-weight:900; }

.prog-bar { height:3px; background:#0F2040; border-radius:2px; overflow:hidden; margin-bottom:5px; display:none; }
.prog-fill { height:100%; background:linear-gradient(90deg,#FFD700,#00FF88); border-radius:2px; transition:width 0.08s; }
.prog-txt { font-size:8px; color:#445; letter-spacing:2px; text-align:center; display:none; margin-bottom:6px; }

.scan-btn {
  width:100%; padding:15px;
  background:linear-gradient(135deg,#1A0F00,#3D2800);
  border:2px solid #FFD700; border-radius:10px;

  cursor:pointer; font-family:inherit;
  box-shadow:0 0 20px rgba(255,215,0,0.15);
}
.scan-btn:active { transform:scale(0.98); }
.scan-btn.off { border-color:#1A2030; color:#223; box-shadow:none; background:#080C14; }

/* TABS - match exact Polymarket categories */
.tabs { display:flex; overflow-x:auto; gap:6px; padding:10px 16px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }

}
.tab.on { border-color:#FFD700; background:rgba(255,215,0,0.1); color:#FFD700; }

.srch { display:flex; gap:8px; padding:0 16px 10px; }

  border-radius:8px; padding:12px 14px; color:#fff;

.srch input::placeholder { color:#223; }
.srch input:focus { border-color:#00FF88; }
.srch-btn {
  background:#003D1A; border:1px solid #00FF88; border-radius:8px;
  color:#00FF88; font-size:13px; font-weight:900; letter-spacing:1px;
  padding:12px 14px; cursor:pointer; font-family:inherit; white-space:nowrap;
}
.srch-btn:active { background:#005C28; }

.lbl { font-size:9px; letter-spacing:4px; color:#223; padding:0 16px 8px; }
.cards { padding:0 16px; }

.card {
  background:#0A1628; border:1px solid #0F2040;
  border-left:3px solid #FF6B00; border-radius:10px;
  margin-bottom:12px; overflow:hidden;
  opacity:0; transform:translateY(8px); transition:opacity 0.3s, transform 0.3s;
}
.card.show { opacity:1; transform:translateY(0); }

.card-hdr { display:flex; justify-content:space-between; align-items:center; padding:10px 14px 4px; }
.ctag { font-size:9px; letter-spacing:1px; font-weight:700; padding:3px 8px; border-radius:4px; }

let curCat = 'ALL';
let scanDone = false;

// Pulse dot
let p = true;
setInterval(() => {
  p = !p;
  const d = document.getElementById('dot');
  if(d) d.style.opacity = p ? '1' : '0.3';
}, 900);

function setCat(cat, btn) {
  curCat = cat;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  if(scanDone) renderCards();
}

function getFiltered() {
  return curCat === 'ALL' ? BETS : BETS.filter(b => b.cat === curCat);
}

function doSearch() {
  const q = document.getElementById('si').value.trim();
  const base = CAT_URLS[curCat] || 'https://polymarket.com/markets';
  const url = q ? 'https://polymarket.com/search?q=' + encodeURIComponent(q) : base;
  window.open(url, '_blank');
}

document.getElementById('si').addEventListener('keypress', e => {
  if(e.key === 'Enter') doSearch();
});

    return;

    <div class="card" id="c${b.id}" style="transition-delay:${i*0.05}s">
      <div class="card-hdr">
        <span class="ctag" style="background:${cs.bg};color:${cs.c}">${b.cat}</span>
        <div class="card-r">
          <span class="wr">${b.wr} WIN RATE</span>
          <span class="cscore">${b.score}</span>
        </div>
      </div>
      <div class="qtext">${b.q}</div>
      <div class="sell-box">
        <div class="sell-hdr">🔴 SELL WHEN</div>
        <div class="sell-val">Sell when YES rises above ${b.sell}</div>
        <div class="sell-note">${b.note}</div>

        <div class="chip"><div class="cl">YES%</div><div class="cv">${b.entry}</div></div>
        <div class="chip"><div class="cl">EDGE</div><div class="cv" style="color:#00FF88">${b.edge}</div></div>
        <div class="chip"><div class="cl">PAYOUT</div><div class="cv" style="color:#00FF88">${b.payout}</div></div>
        <div class="chip"><div class="cl">SELL AT</div><div class="cv" style="color:#FF6B00">${b.sell}</div></div>
      </div>
      <button class="bet-btn" onclick="window.open('${b.url}','_blank')">
        🔗&nbsp; OPEN IN POLYMARKET → PLACE BET
      </button>
    </div>`;
  }).join('');

  requestAnimationFrame(() => {
    bets.forEach((b, i) => {
      setTimeout(() => {
        const el = document.getElementById('c' + b.id);
        if(el) el.classList.add('show');
      }, i * 55);
    });
  });
}

function runScan() {
  const btn = document.getElementById('scanBtn');
  const pb  = document.getElementById('pb');
  const pf  = document.getElementById('pf');
  const pt  = document.getElementById('pt');
  const dot = document.getElementById('dot');
  const stxt = document.getElementById('stxt');
  const sv   = document.getElementById('sv');

  if(btn.classList.contains('off')) return;

  btn.classList.add('off');
  btn.textContent = '⟳  SCANNING POLYMARKET...';
  pb.style.display = 'block';
  pt.style.display = 'block';
  dot.style.background = '#FFD700';
  stxt.style.color = '#FFD700';
  stxt.textContent = 'SCANNING';
  document.getElementById('cards').innerHTML = '';

  let prog = 0;
  const iv = setInterval(() => {
    prog += Math.floor(Math.random() * 6) + 3;
    if(prog >= 100) {
      prog = 100;
      clearInterval(iv);
      pf.style.width = '100%';
      pt.textContent = 'SCAN COMPLETE · 22 SIGNALS FOUND 🔥';
      sv.textContent = '100';
      setTimeout(() => {
        btn.classList.remove('off');
        btn.textContent = '▶  RUN SCAN';
        dot.style.background = '#00FF88';
        stxt.style.color = '#00FF88';
        stxt.textContent = 'STANDBY';
        pb.style.display = 'none';
        pt.style.display = 'none';
        scanDone = true;
        renderCards();
      }, 700);
      return;
    }
    pf.style.width = prog + '%';
    pt.textContent = 'SCANNING POLYMARKET... ' + prog + '%';
    sv.textContent = prog;
  }, 60);
}
</script>
</body>
</html>
